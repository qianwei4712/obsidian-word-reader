name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Security scan
        run: npm run security:scan

      - name: Package release zip
        run: npm run release:zip

      - name: Validate release
        run: node scripts/release-check.mjs --tag "$GITHUB_REF_NAME"

      - name: Extract release notes
        run: npm run release:notes

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
            release/obsidian-word-reader-${{ steps.package.outputs.version }}.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/main.js#main.js" \
            "dist/manifest.json#manifest.json" \
            "dist/styles.css#styles.css" \
            "release/obsidian-word-reader-${{ steps.package.outputs.version }}.zip#obsidian-word-reader-${{ steps.package.outputs.version }}.zip" \
            --title "${{ steps.package.outputs.version }}" \
            --notes-file "release/CHANGELOG-${{ steps.package.outputs.version }}.md" \
            --verify-tag
